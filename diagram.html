<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>尾羽急本線 配線図（完全版）</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="diagram-wrapper">

  <!-- ▼ 尾羽原駅（終端・2面5線） -->
  <div class="yard-wrapper">
    <h2 class="yard-title">尾羽原駅（終端・2面5線）</h2>

    <div class="yard">

      <!-- 上ホーム -->
      <div class="platform platform-top"></div>

      <!-- 線路群 -->
      <div class="tracks">

        <div class="track-row">
          <div class="track-label">5番線</div>
          <div class="track track-main"></div>
          <div class="buffer"></div>
        </div>

        <div class="track-row">
          <div class="track-label">4番線</div>
          <div class="track track-main"></div>
          <div class="buffer"></div>
        </div>

        <div class="track-row">
          <div class="track-label">3番線<br><span class="sub">（留置）</span></div>
          <div class="track track-siding"></div>
          <div class="buffer"></div>
        </div>

        <div class="track-row">
          <div class="track-label">2番線</div>
          <div class="track track-main"></div>
          <div class="buffer"></div>
        </div>

        <div class="track-row">
          <div class="track-label">1番線</div>
          <div class="track track-main"></div>
          <div class="buffer"></div>
        </div>

      </div>

      <!-- 下ホーム -->
      <div class="platform platform-bottom"></div>

    </div>
  </div>

  <!-- ▼ 尾羽原 → 井口（複線） -->
  <div class="double-track">
    <div class="track-block">
      <div class="line"></div>
      <div class="node"></div>
      <div class="label">井口（上り）</div>
    </div>

    <div class="track-block">
      <div class="line"></div>
      <div class="node"></div>
      <div class="label">井口（下り）</div>
    </div>
  </div>

  <!-- ▼ 井口 → 梅郷 -->
  <div class="double-track">
    <div class="track-block">
      <div class="line"></div>
      <div class="node"></div>
      <div class="label">梅郷（上り）</div>
    </div>

    <div class="track-block">
      <div class="line"></div>
      <div class="node"></div>
      <div class="label">梅郷（下り）</div>
    </div>
  </div>

  <!-- ▼ 梅郷 → 雲中 -->
  <div class="double-track">
    <div class="track-block">
      <div class="line"></div>
      <div class="node"></div>
      <div class="label">雲中（上り）</div>
    </div>

    <div class="track-block">
      <div class="line"></div>
      <div class="node"></div>
      <div class="label">雲中（下り）</div>
    </div>
  </div>

  <!-- ▼ 雲中 → 安越 -->
  <div class="double-track">
    <div class="track-block">
      <div class="line"></div>
      <div class="node"></div>
      <div class="label">安越（上り）</div>
    </div>

    <div class="track-block">
      <div class="line"></div>
      <div class="node"></div>
      <div class="label">安越（下り）</div>
    </div>
  </div>

</div>

</body>
</html>
